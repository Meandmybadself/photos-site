<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Me &amp; Dan</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<header>
  <h1><a href="/">Photos</a></h1>
</header>
<main class="photo-detail">
  <figure>
    <img src="https://res.cloudinary.com/meandmybadpictures/image/upload/v1773521121/_singles/r0000258-full.webp" alt="Me &amp; Dan" loading="eager">
    <figcaption>Me &amp; Dan</figcaption>
  </figure>
  
  <nav class="photo-pagination">
    <span class="photo-nav"></span>
    <a class="photo-nav photo-nav-next" href="/photos/img-6561/">Next &rarr;</a>
  </nav>
</main>
<script>document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft'){var a=document.querySelector('.photo-nav-prev');if(a)a.click()}if(e.key==='ArrowRight'){var a=document.querySelector('.photo-nav-next');if(a)a.click()}})</script>
</body>
</html>
